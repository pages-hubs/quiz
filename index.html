<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="dara.js" type="text/javascript" defer></script>
    <script src="script.js" type="text/javascript" defer></script>
    <title>Quiz Website</title>
</head>
<body>
<div id="password-modal">
    <div class="modal-content">
        <h2>Введите пароль для доступа к контенту</h2>
        <input type="password" id="password-input" placeholder="Пароль">
        <button id="submit-password">Войти</button>
        <p id="password-error" class="error"></p>
    </div>
</div>
<main id="main-content" style="display: none;">
    <h1>Тест из 3027 вопросов</h1>
    <section>
        <div id="current-page"></div>
    </section>
    <div id="quiz-container"></div>
    <section>
        <h2>Завершение страницы</h2>
        <div id="result"></div>
    </section>
    <section id="pagination-container">
        <h2>Страницы</h2>
        <div class="pagination" id="pagination"></div>
    </section>
    <section>
        <h2>Сбросить прогресс</h2>
        <button id="reset-progress">Сбросить прогресс</button>
    </section>
</main>
</body>
</html>
